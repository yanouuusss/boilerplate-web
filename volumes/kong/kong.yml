# Routage Kong (mode déclaratif, sans base) : une URL unique http://localhost:8000
# vers les services Supabase. Pas de key-auth ici : l'application serveur est le seul
# client (le navigateur ne parle jamais à Supabase directement).
_format_version: '3.0'

services:
  - name: auth
    url: http://auth:9999/
    routes:
      - name: auth
        strip_path: true
        paths:
          - /auth/v1/

  - name: storage
    url: http://storage:5000/
    routes:
      - name: storage
        strip_path: true
        paths:
          - /storage/v1/
