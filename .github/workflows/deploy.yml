# Pipeline main : build de l'image et push sur GHCR, taguée par SHA (rollback) et latest.
# Les étapes staging/production seront branchées quand une cible d'hébergement existera — voir docs/runbook.md.
name: Deploy

on:
  push:
    branches: [main]

jobs:
  docker-image:
    name: docker-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
